<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚙️ Admin Panel - World Cup 2026</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <nav class="navbar admin-nav">
        <div class="container">
            <h1>⚙️ Admin Panel - World Cup 2026</h1>
            <div>
                <span id="adminName" style="color:white; margin-right:15px;"></span>
                <button onclick="logout()" class="btn-logout">🚪 Đăng Xuất</button>
                <a href="index.html" class="btn-back" style="margin-left:10px;">← Về trang chính</a>
            </div>
        </div>
    </nav>

    <div class="container admin-container">
        <!-- Tabs -->
        <div class="admin-tabs">
            <button class="tab-btn active" data-tab="dashboard">📊 Dashboard</button>
            <button class="tab-btn" data-tab="matches">⚽ Quản Lý Trận Đấu</button>
            <button class="tab-btn" data-tab="users">👥 Quản Lý Người Dùng</button>
            <button class="tab-btn" data-tab="predictions">📝 Dự Đoán</button>
            <button class="tab-btn" data-tab="logs">📋 Lịch Sử</button>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="tab-content active">
            <div class="stats-grid">
                <div class="stat-card"><h3>Tổng người dùng</h3><p id="totalUsers">0</p></div>
                <div class="stat-card"><h3>Tổng trận đấu</h3><p id="totalMatches">0</p></div>
                <div class="stat-card"><h3>Tổng dự đoán</h3><p id="totalPredictions">0</p></div>
            </div>
        </div>

        <!-- Quản lý trận đấu -->
        <div id="matches" class="tab-content">
            <div class="admin-actions">
                <button onclick="showAddMatchForm()" class="btn-primary">➕ Thêm Trận Đấu</button>
            </div>
            
            <div id="matchForm" style="display:none;" class="form-container">
                <h3>Thêm/Cập nhật trận đấu</h3>
                <input type="hidden" id="matchId">
                <div class="form-row">
                    <div class="form-group">
                        <label>Đội nhà</label>
                        <input type="text" id="homeTeam" placeholder="VD: Brazil">
                    </div>
                    <div class="form-group">
                        <label>Đội khách</label>
                        <input type="text" id="awayTeam" placeholder="VD: Argentina">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Ngày</label>
                        <input type="date" id="matchDate">
                    </div>
                    <div class="form-group">
                        <label>Giờ</label>
                        <input type="time" id="matchTime">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Chấp trái</label>
                        <select id="handicap">
                            <option value="0">0 (Đồng banh)</option>
                            <option value="0.25">0.25 (Chấp 1/4)</option>
                            <option value="0.5">0.5 (Chấp 1/2)</option>
                            <option value="0.75">0.75 (Chấp 3/4)</option>
                            <option value="1">1 (Chấp 1 trái)</option>
                            <option value="1.25">1.25 (Chấp 1 1/4)</option>
                            <option value="1.5">1.5 (Chấp 1 1/2)</option>
                            <option value="1.75">1.75 (Chấp 1 3/4)</option>
                            <option value="2">2 (Chấp 2 trái)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Bảng đấu</label>
                        <input type="text" id="group" placeholder="VD: Group A">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Tỷ số đội nhà</label>
                        <input type="number" id="homeScore" placeholder="Để trống nếu chưa có">
                    </div>
                    <div class="form-group">
                        <label>Tỷ số đội khách</label>
                        <input type="number" id="awayScore" placeholder="Để trống nếu chưa có">
                    </div>
                </div>
                <div class="form-actions">
                    <button onclick="saveMatch()" class="btn-primary">💾 Lưu</button>
                    <button onclick="cancelMatchForm()" class="btn-secondary">❌ Hủy</button>
                </div>
            </div>

            <div id="matchListAdmin"></div>
        </div>

        <!-- Quản lý người dùng -->
        <div id="users" class="tab-content">
            <div id="userList"></div>
        </div>

        <!-- Dự đoán -->
        <div id="predictions" class="tab-content">
            <div id="predictionList"></div>
        </div>

        <!-- Lịch sử -->
        <div id="logs" class="tab-content">
            <div id="logList"></div>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
